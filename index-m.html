document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

form:translateY(30px);transition:opacity .75s cubic-bezier(.16,1,.3,1),transform .75s cubic-bezier(.16,1,.3,1);}\n  .rv.in{opacity:1;transform:none;}\n  .h-sec{transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s,border-color .3s;text-decoration:none;}\n  .h-sec.live:hover{transform:translateY(-4px);border-color:rgba(63,208,216,.5)!important;box-shadow:0 24px 60px rgba(0,0,0,.5);}\n  .h-sec.live:hover .h-arrow{transform:translateX(5px);opacity:1;}\n  .h-sec.live:hover .h-num{color:#3FD0D8;}\n  .h-arrow{transition:transform .3s cubic-bezier(.16,1,.3,1),opacity .25s;opacity:.4;}\n  .h-num{transition:color .3s;}\n  .h-cta:hover{filter:brightness(1.08);transform:translateY(-2px);}\n  .h-cta{transition:filter .2s,transform .2s;}\n  .h-tool:hover{border-color:rgba(63,208,216,.4)!important;transform:translateY(-3px);}\n  .h-tool{transition:transform .25s,border-color .25s,box-shadow .25s;display:flex;flex-direction:column;}\n  .h-tool:hover{box-shadow:0 20px 50px rgba(0,0,0,.45);}\n  .h-tool-cta{margin-top:auto;transition:gap .25s;}\n  .h-tool:hover .h-tool-cta{gap:11px;}\n  /* ===== tool modal ===== */\n  .tm-back{position:fixed;inset:0;z-index:130;display:flex;align-items:center;justify-content:center;padding:28px;background:rgba(4,6,6,.74);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);animation:tmBack .25s ease forwards;}\n  @keyframes tmBack{from{opacity:0;}to{opacity:1;}}\n  .tm-panel{animation:tmPanel .44s cubic-bezier(.16,1,.3,1) forwards;}\n  @keyframes tmPanel{from{opacity:0;transform:translateY(28px) scale(.955);}to{opacity:1;transform:none;}}\n  .tm-close:hover{background:rgba(255,255,255,.13)!important;color:#fff!important;}\n  .tm-cta:hover{filter:brightness(1.08);transform:translateY(-2px);}\n  .tm-cta{transition:filter .2s,transform .2s;}\n  .tm-step{animation:tmStep .55s cubic-bezier(.16,1,.3,1) backwards;}\n  @keyframes tmStep{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:none;}}\n  /* compass demo */\n  .cmp-plot{transform-origin:110px 110px;animation:cmpPlot 6s cubic-bezier(.16,1,.3,1) infinite;}\n  @keyframes cmpPlot{0%{opacity:0;transform:scale(0) rotate(-14deg);}13%{opacity:1;transform:scale(1.07) rotate(0);}22%{transform:scale(1);}82%{opacity:1;transform:scale(1);}93%{opacity:0;transform:scale(0) rotate(10deg);}100%{opacity:0;transform:scale(0);}}\n  .cmp-sweep{transform-origin:110px 110px;animation:cmpSweep 6s linear infinite;}\n  @keyframes cmpSweep{to{transform:rotate(360deg);}}\n  /* johari demo */\n  .jo-q{position:absolute;border-radius:9px;padding:9px 11px;overflow:hidden;box-shadow:inset 0 0 0 2px #0A0F0F;}\n  .jo-open{left:0;top:0;background:rgba(0,157,168,.92);animation:joOpen 6s cubic-bezier(.16,1,.3,1) infinite;}\n  .jo-blind{right:0;top:0;background:rgba(63,208,216,.24);animation:joBlind 6s cubic-bezier(.16,1,.3,1) infinite;}\n  .jo-hidden{left:0;bottom:0;background:rgba(255,255,255,.1);animation:joHidden 6s cubic-bezier(.16,1,.3,1) infinite;}\n  .jo-unknown{right:0;bottom:0;background:rgba(255,255,255,.05);animation:joUnknown 6s cubic-bezier(.16,1,.3,1) infinite;}\n  @keyframes joOpen{0%,12%{width:50%;height:50%;}40%,72%{width:68%;height:68%;}92%,100%{width:50%;height:50%;}}\n  @keyframes joBlind{0%,12%{width:50%;height:50%;}40%,72%{width:32%;height:68%;}92%,100%{width:50%;height:50%;}}\n  @keyframes joHidden{0%,12%{width:50%;height:50%;}40%,72%{width:68%;height:32%;}92%,100%{width:50%;height:50%;}}\n  @keyframes joUnknown{0%,12%{width:50%;height:50%;}40%,72%{width:32%;height:32%;}92%,100%{width:50%;height:50%;}}\n  /* values demo */\n  .val-chip{animation-duration:8s;animation-iteration-count:infinite;animation-timing-function:cubic-bezier(.16,1,.3,1);}\n  .val-drop1{animation-name:valDrop1;}\n  .val-drop2{animation-name:valDrop2;}\n  .val-keep{animation-name:valKeep;}\n  @keyframes valDrop1{0%,18%{opacity:1;transform:scale(1);}32%,88%{opacity:.13;transform:scale(.86);}96%,100%{opacity:1;transform:scale(1);}}\n  @keyframes valDrop2{0%,42%{opacity:1;transform:scale(1);}56%,88%{opacity:.13;transform:scale(.86);}96%,100%{opacity:1;transform:scale(1);}}\n  @keyframes valKeep{0%,60%{background:rgba(255,255,255,.06);color:#cdd6d5;border-color:rgba(255,255,255,.12);transform:scale(1);}72%,90%{background:#009DA8;color:#fff;border-color:#3FD0D8;transform:scale(1.08);}98%,100%{background:rgba(255,255,255,.06);color:#cdd6d5;border-color:rgba(255,255,255,.12);transform:scale(1);}}\n  .val-cap{position:absolute;left:0;right:0;animation-duration:8s;animation-iteration-count:infinite;animation-timing-function:ease;}\n  .val-cap1{animation-name:valCap1;}\n  .val-cap2{animation-name:valCap2;}\n  .val-cap3{animation-name:valCap3;}\n  @keyframes valCap1{0%,24%{opacity:1;}32%,100%{opacity:0;}}\n  @keyframes valCap2{0%,32%{opacity:0;}40%,56%{opacity:1;}64%,100%{opacity:0;}}\n  @keyframes valCap3{0%,64%{opacity:0;}72%,92%{opacity:1;}98%,100%{opacity:0;}}\n  /* reflection demo */\n  .rf-r1{animation:rfR1 6s ease infinite;}\n  .rf-r2{animation:rfR2 6s ease infinite;}\n  .rf-r3{animation:rfR3 6s ease infinite;}\n  @keyframes rfR1{0%,5%{opacity:0;transform:translateY(9px);}13%,90%{opacity:1;transform:none;}97%,100%{opacity:0;}}\n  @keyframes rfR2{0%,25%{opacity:0;transform:translateY(9px);}33%,90%{opacity:1;transform:none;}97%,100%{opacity:0;}}\n  @keyframes rfR3{0%,45%{opacity:0;transform:translateY(9px);}53%,90%{opacity:1;transform:none;}97%,100%{opacity:0;}}\n  .rf-b1{animation:rfB1 6s ease infinite;}\n  .rf-b2{animation:rfB2 6s ease infinite;}\n  .rf-b3{animation:rfB3 6s ease infinite;}\n  @keyframes rfB1{0%,16%{background:transparent;border-color:rgba(255,255,255,.25);}23%,90%{background:#009DA8;border-color:#009DA8;}97%,100%{background:transparent;border-color:rgba(255,255,255,.25);}}\n  @keyframes rfB2{0%,36%{background:transparent;border-color:rgba(255,255,255,.25);}43%,90%{background:#009DA8;border-color:#009DA8;}97%,100%{background:transparent;border-color:rgba(255,255,255,.25);}}\n  @keyframes rfB3{0%,56%{background:transparent;border-color:rgba(255,255,255,.25);}63%,90%{background:#009DA8;border-color:#009DA8;}97%,100%{background:transparent;border-color:rgba(255,255,255,.25);}}\n  .rf-m1{opacity:0;animation:rfM1 6s ease infinite;}\n  .rf-m2{opacity:0;animation:rfM2 6s ease infinite;}\n  .rf-m3{opacity:0;animation:rfM3 6s ease infinite;}\n  @keyframes rfM1{0%,17%{opacity:0;}25%,90%{opacity:1;}97%,100%{opacity:0;}}\n  @keyframes rfM2{0%,37%{opacity:0;}45%,90%{opacity:1;}97%,100%{opacity:0;}}\n  @keyframes rfM3{0%,57%{opacity:0;}65%,90%{opacity:1;}97%,100%{opacity:0;}}\n  @media (max-width:680px){ .tm-grid{grid-template-columns:1fr!important;} }\n\n  /* ===== MOBILE (portrait) ===== */\n  @media (max-width:768px){\n    section[style]{padding-left:18px !important;padding-right:18px !important;}\n    div[style*=\"grid-template-columns\"]{grid-template-columns:1fr !important;}\n    nav[style]{flex-wrap:wrap !important;}\n    img,svg{max-width:100%;height:auto;}\n    textarea,input,select{font-size:16px !important;}\n    header{height:auto !important;min-height:0 !important;padding-top:11px !important;padding-bottom:11px !important;}\n    header > div{flex-wrap:wrap !important;gap:8px 12px !important;}\n    header > div > div{min-width:0 !important;}\n    #cotr-vp-toggle{bottom:84px !important;}\n  }\n<\u002Fstyle>\n<script src=\"0d976dc3-1c2c-4d92-b774-5b3edf9e13fd\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"background:#0B0B0A;color:#F4F2EC;font-family:'Inclusive Sans',system-ui,sans-serif;overflow-x:hidden;min-height:100vh;\">\n\n  <!-- top bar -->\n  <header style=\"position:sticky;top:0;z-index:80;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);background:rgba(11,11,10,.62);border-bottom:1px solid rgba(255,255,255,.07);\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 40px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:20px;\">\n      <div style=\"display:flex;align-items:center;gap:13px;min-width:0;\">\n        <img src=\"c3526108-da46-4351-8abf-710fe8f6aa9c\" alt=\"\" style=\"width:30px;height:30px;object-fit:contain;display:block;\">\n        <span style=\"font-family:'Manrope',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.01em;color:#fff;white-space:nowrap;\">College of the Rockies<\u002Fspan>\n        <span style=\"color:rgba(255,255,255,.2);\">·<\u002Fspan>\n        <span style=\"font-size:13px;color:#7E8C8B;font-weight:600;white-space:nowrap;\">Leadership Development<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;\">\n        <span style=\"font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;color:#7E8C8B;white-space:nowrap;\">{{ overallText }}<\u002Fspan>\n        <div style=\"width:120px;height:7px;border-radius:9999px;background:rgba(255,255,255,.08);overflow:hidden;\">\n          <div style=\"height:100%;border-radius:9999px;background:linear-gradient(90deg,#009DA8,#3FD0D8);transition:width .6s cubic-bezier(.16,1,.3,1);{{ overallBarStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section style=\"position:relative;max-width:1180px;margin:0 auto;padding:90px 40px 64px;\">\n    <div style=\"position:absolute;top:6%;right:-8%;width:640px;height:640px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(0,157,168,.2),rgba(0,157,168,0) 68%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative;\">\n      <div class=\"rv in\" style=\"display:inline-flex;align-items:center;gap:12px;padding:9px 18px;border:1px solid rgba(255,255,255,.16);border-radius:9999px;margin-bottom:36px;\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#3FD0D8;box-shadow:0 0 12px #3FD0D8;\"><\u002Fspan>\n        <span style=\"font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#9FB3B2;\">Module 01 · Level 1 Core Foundat " hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;gap:12px;width:264px;\">\n                <div class=\"rf-r1\" style=\"display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);\">\n                  <span class=\"rf-b1\" style=\"width:25px;height:25px;flex:none;border-radius:7px;border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;\"><svg class=\"rf-m1\" viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <div><div style=\"font-family:'Manrope',sans-serif;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#3FD0D8;\">Insight<\u002Fdiv><div style=\"font-size:.9rem;color:#cdd6d5;\">One thing you learned<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"rf-r2\" style=\"display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);\">\n                  <span class=\"rf-b2\" style=\"width:25px;height:25px;flex:none;border-radius:7px;border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;\"><svg class=\"rf-m2\" viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <div><div style=\"font-family:'Manrope',sans-serif;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#3FD0D8;\">Behaviour<\u002Fdiv><div style=\"font-size:.9rem;color:#cdd6d5;\">One to watch closely<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"rf-r3\" style=\"display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);\">\n                  <span class=\"rf-b3\" style=\"width:25px;height:25px;flex:none;border-radius:7px;border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;\"><svg class=\"rf-m3\" viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <div><div style=\"font-family:'Manrope',sans-serif;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#3FD0D8;\">Action<\u002Fdiv><div style=\"font-size:.9rem;color:#cdd6d5;\">One thing to try next<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"height:20px;position:relative;width:100%;text-align:center;font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;color:#7E8C8B;\">\n              <sc-if value=\"{{ activeIsValues }}\" hint-placeholder-val=\"{{ false }}\">\n                <span class=\"val-cap val-cap1\">Start with ten<\u002Fspan>\n                <span class=\"val-cap val-cap2\">Narrow to five<\u002Fspan>\n                <span class=\"val-cap val-cap3\" style=\"color:#3FD0D8;\">The three that guide you<\u002Fspan>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ captionStatic }}\" hint-placeholder-val=\"{{ true }}\"><span>{{ activeCaption }}<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- info -->\n          <div style=\"padding:40px 34px 38px;\">\n            <div style=\"font-family:'Manrope',sans-serif;font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#3FD0D8;margin-bottom:12px;\">Signature tool<\u002Fdiv>\n            <h3 style=\"margin:0 0 10px;font-family:'Manrope',sans-serif;font-size:1.7rem;font-weight:800;letter-spacing:-.02em;color:#fff;\">{{ activeName }}<\u002Fh3>\n            <p style=\"margin:0 0 26px;font-size:1rem;line-height:1.55;color:#9FA9A8;\">{{ activeLong }}<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:15px;margin-bottom:30px;\">\n              <sc-for list=\"{{ activeSteps }}\" as=\"st\" hint-placeholder-count=\"3\">\n                <div class=\"tm-step\" style=\"display:flex;gap:14px;align-items:flex-start;{{ st.delayStyle }}\">\n                  <span style=\"width:30px;height:30px;flex:none;border-radius:9px;background:rgba(0,157,168,.16);color:#3FD0D8;font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;\">{{ st.n }}<\u002Fspan>\n                  <div style=\"padding-top:1px;\"><div style=\"font-family:'Manrope',sans-serif;font-size:1rem;font-weight:700;color:#fff;margin-bottom:3px;\">{{ st.label }}<\u002Fdiv><div style=\"font-size:.92rem;line-height:1.5;color:#9FA9A8;\">{{ st.text }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <a href=\"{{ activeSectionHref }}\" class=\"tm-cta\" style=\"display:inline-flex;align-items:center;gap:10px;text-decoration:none;border-radius:12px;padding:14px 24px;background:#009DA8;color:#fff;font-family:'Manrope',sans-serif;font-size:.98rem;font-weight:700;box-shadow:0 12px 30px rgba(0,157,168,.3);\">{{ activeCtaLabel }}<svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.SECTIONS = [\n      { id:'intro', num:'00', kicker:'Introduction', title:'Understanding How You Lead',\n        desc:'Every leader has a pattern. Set your starting point and the situation you\\u2019ll work with throughout the module.',\n        href:'introduction-m.html', key:'cotr-m1-intro-v2',\n        progress:(d)=>{ let n=0; if((d.situation||'').trim())n++; const sel=d.sel||[[],[],[]]; const cu=d.customs||['','','']; for(let i=0;i<3;i++){ if((sel[i]&&sel[i].length)||(cu[i]||'').trim())n++; } return n/4; }, built:true },\n      { id:'s1', num:'01', kicker:'Competency 01 · Leadership Identity', title:'Leadership Identity',\n        desc:'Examine the experiences that shaped you, map your tendencies with the Leadership Compass, and explore intent versus impact.',\n        href:'section-1-m.html', key:'cotr-m1-section1-v2',\n        progress:(d)=>{ return typeof d.maxStep==='number' ? Math.min(1, d.maxStep/11) : 0; }, built:true },\n      { id:'s2', num:'02', kicker:'Competency 02 · Self-Awareness', title:'Self-Awareness in Practice',\n        desc:'See yourself more clearly through the Johari Window, treat feedback as information, and build a reflective practice.',\n        href:'section-2-m.html', key:'cotr-m1-section2-v2',\n        progress:(d)=>{ return typeof d.maxStep==='number' ? Math.min(1, d.maxStep/9) : 0; }, built:true },\n      { id:'s3', num:'03', kicker:'Competency 03 · Values Under Pressure', title:'Values Under Pressure',\n        desc:'Map your values from ten down to three, work through values conflicts, and explore leading with integrity.',\n        href:'section-3-m.html', key:'cotr-m1-section3-v2',\n        progress:(d)=>{ return typeof d.maxStep==='number' ? Math.min(1, d.maxStep/9) : 0; }, built:true },\n      { id:'integration', num:'04', kicker:'The Capstone', title:'Your Leadership Profile',\n        desc:'Bring identity, self-awareness, and values into one picture. Review, refine, and export your profile.',\n        href:'profile-m.html', key:'cotr-m1-profile-v2',\n        progress:(d)=>{ return d.finalized ? 1 : 0; }, built:true },\n      { id:'wrap', num:'05', kicker:'Module Wrap-Up', title:'Looking in the Mirror',\n        desc:'Revisit your starting point, capture key insights, and see what comes next in the program.',\n        href:'wrap-up-m.html', key:'cotr-m1-wrap-v2',\n        progress:(d)=>{ return d.done ? 1 : 0; }, built:true }\n    ];\n    this.TOOLS = [\n      { type:'compass', name:'Leadership Compass', desc:'Maps how strongly four tendencies show up in how you lead.',\n        long:'A quick self-assessment that scores four leadership tendencies, then plots them into a shape you can read at a glance.',\n        caption:'Sample profile — Directing-led', href:'section-1-m.html', cta:'Try it in Section 01',\n        steps:[ {n:'1',label:'Answer',text:'Run four short checklists — one per tendency.'}, {n:'2',label:'Score',text:'Count your yes answers for a 0\\u20135 score each.'}, {n:'3',label:'Plot',text:'Connect the four scores to see your shape.'} ] },\n      { type:'johari', name:'Johari Window', desc:'Surfaces blind spots and grows what\\u2019s known about you.',\n        long:'A four-pane map of what\\u2019s known and unknown to you and others. Feedback shrinks your blind spots and grows the Open area.',\n        caption:'Feedback grows your Open area', href:'section-2-m.html', cta:'Try it in Section 02',\n        steps:[ {n:'1',label:'Place',text:'Sort behaviours across known / unknown to self and others.'}, {n:'2',label:'Ask',text:'Use feedback to move blind spots into the open.'}, {n:'3',label:'Grow',text:'A bigger Open area makes you easier to work with.'} ] },\n      { type:'values', name:'Personal Values Mapping', desc:'Narrows your values from ten to the three that guide you.',\n        long:'A funnel that takes a long list of values down to the three that most consistently guide your decisions under pressure.',\n        caption:'', href:'section-3-m.html', cta:'Try it in Section 03',\n        steps:[ {n:'1',label:'Ten',text:'Start from a list and pick the ten that matter most.'}, {n:'2',label:'Five',text:'Narrow to the five you\\u2019d protect under pressure.'}, {n:'3',label:'Three',text:'Land on the three that guide your decisions.'} ] },\n      { type:'reflect', name:'Reflection Prompts', desc:'Short, saveable prompts that turn experience into learning.',\n        long:'Three short prompts you answer at the end of each section. Over time they become a record of how your thinking evolves.',\n        caption:'Three lines, end of each section', href:'section-2-m.html', cta:'See it in Section 02',\n        steps:[ {n:'1',label:'Insight',text:'Capture one thing you learned.'}, {n:'2',label:'Behaviour',text:'Name one behaviour to watch more closely.'}, {n:'3',label:'Action',text:'Commit to one thing to try next.'} ] }\n    ];\n    this.VAL_CHIPS = [\n      {label:'Honesty',cls:'val-keep'}, {label:'Respect',cls:'val-drop1'}, {label:'Growth',cls:'val-keep'}, {label:'Courage',cls:'val-drop2'}, {label:'Fairness',cls:'val-keep'},\n      {label:'Loyalty',cls:'val-drop1'}, {label:'Service',cls:'val-drop1'}, {label:'Trust',cls:'val-drop2'}, {label:'Candour',cls:'val-drop1'}, {label:'Vision',cls:'val-drop1'}\n    ];\n    this.PROFILE_FEEDS = [\n      { label:'Leadership tendencies' }, { label:'Blind spots & growth' }, { label:'Feedback insights' }, { label:'Core values' }, { label:'Commitments' }\n    ];\n    this.state = { data:{}, activeTool:null };\n  }\n  componentDidMount(){\n    const data = {};\n    this.SECTIONS.forEach(s => {\n      try { const raw = localStorage.getItem(s.key); data[s.id] = raw ? JSON.parse(raw) : {}; }\n      catch(e){ data[s.id] = {}; }\n    });\n    this.setState({ data });\n    this._io = new IntersectionObserver((ents)=>{ ents.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); this._io.unobserve(e.target); } }); }, { threshold:0.1, rootMargin:'0px 0px -6% 0px' });\n    requestAnimationFrame(()=>{ document.querySelectorAll('.rv:not(.in)').forEach(el=>this._io.observe(el)); });\n    this._key = (e)=>{ if(e.key==='Escape' && this.state.activeTool!=null) this.closeTool(); };\n    window.addEventListener('keydown', this._key);\n  }\n  componentDidUpdate(_p, prev){ if(prev && prev.activeTool!==this.state.activeTool){ try{ document.body.style.overflow = this.state.activeTool!=null ? 'hidden' : ''; }catch(e){} } }\n  componentWillUnmount(){ if(this._io) this._io.disconnect(); if(this._key) window.removeEventListener('keydown', this._key); try{ document.body.style.overflow=''; }catch(e){} }\n  openTool(i){ this.setState({ activeTool:i }); try{ document.body.style.overflow='hidden'; }catch(e){} }\n  closeTool(){ this.setState({ activeTool:null }); try{ document.body.style.overflow=''; }catch(e){} }\n  pct(s){ const d = this.state.data[s.id] || {}; try { return Math.max(0, Math.min(1, s.progress(d)||0)); } catch(e){ return 0; } }\n  renderVals(){\n    const sections = this.SECTIONS.map(s => {\n      const p = this.pct(s);\n      const started = p > 0.001;\n      const complete = p >= 0.999;\n      const live = !!s.built;\n      let badgeText, badgeStyle, kickerColor;\n      if (!live){ badgeText='Coming soon'; badgeStyle='background:rgba(255,255,255,.06);color:#5d6968;'; kickerColor='#5d6968'; }\n      else if (complete){ badgeText='Complete'; badgeStyle='background:rgba(63,208,216,.16);color:#3FD0D8;'; kickerColor='#3FD0D8'; }\n      else if (started){ badgeText='In progress'; badgeStyle='background:rgba(0,157,168,.18);color:#3FD0D8;'; kickerColor='#3FD0D8'; }\n      else { badgeText='Not started'; badgeStyle='background:rgba(255,255,255,.08);color:#9FB3B2;'; kickerColor='#9FB3B2'; }\n      return {\n        num:s.num, kicker:s.kicker, title:s.title, desc:s.desc,\n        href: live ? s.href : 'javascript:void(0)',\n        live, locked:!live, liveClass: live ? 'live' : 'locked',\n        cursorStyle: live ? 'cursor:pointer;' : 'cursor:default;pointer-events:none;',\n        borderColor: live ? 'rgba(255,255,255,.1)' : 'rgba(255,255,255,.05)',\n        cardBg: live ? '#0F1413' : 'rgba(255,255,255,.015)',\n        numColor: live ? (complete?'#3FD0D8':'#4a5655') : '#2c3635',\n        titleColor: live ? '#fff' : '#5d6968',\n        descColor: live ? '#9FA9A8' : '#4a5655',\n        kickerColor, badgeText, badgeStyle,\n        showBar: live && started,\n        barStyle:'width:'+Math.round(p*100)+'%;',\n        barText: complete ? 'Done' : (Math.round(p*100)+'%')\n      };\n    });\n    // overall = mean across the 6 sections\n    const ps = this.SECTIONS.map(s=>this.pct(s));\n    const overall = ps.reduce((a,b)=>a+b,0)/ps.length;\n    const overallPct = Math.round(overall*100);\n    // resume: first built section that's incomplete, else intro\n    let resume = this.SECTIONS.find(s=>s.built && this.pct(s)<0.999) || this.SECTIONS.find(s=>s.built);\n    const anyStarted = ps.some(p=>p>0.001);\n    const profileP = this.pct(this.SECTIONS[4]);\n    const at = this.state.activeTool;\n    const T = (at!=null) ? this.TOOLS[at] : null;\n    return {\n      sections, tools:this.TOOLS.map((t,i)=>({ name:t.name, desc:t.desc, isCompass:t.type==='compass', isJohari:t.type==='johari', isValues:t.type==='values', isReflect:t.type==='reflect', onOpen:()=>this.openTool(i) })),\n      profileFeeds:this.PROFILE_FEEDS,\n      overallText:'Module '+overallPct+'% complete',\n      overallBarStyle:'width:'+overallPct+'%;',\n      resumeHref: resume ? resume.href : this.SECTIONS[0].href,\n      resumeLabel: anyStarted ? 'Resume the module' : 'Begin the module',\n      profileStatus: profileP>=0.999 ? 'Profile ready' : (anyStarted ? 'Assembling…' : 'Awaiting your work'),\n      // ---- tool modal ----\n      modalOpen: at!=null,\n      onClose: ()=>this.closeTool(),\n      stopProp: (e)=>{ if(e && e.stopPropagation) e.stopPropagation(); },\n      valChips: this.VAL_CHIPS,\n      activeName: T ? T.name : '',\n      activeLong: T ? T.long : '',\n      activeSteps: T ? T.steps.map((st,i)=>({ n:st.n, label:st.label, text:st.text, delayStyle:'animation-delay:'+(0.12+i*0.09).toFixed(2)+'s;' })) : [],\n      activeSectionHref: T ? T.href : 'javascript:void(0)',\n      activeCtaLabel: T ? T.cta : '',\n      activeCaption: T ? T.caption : '',\n      captionStatic: !!(T && T.type!=='values'),\n      activeIsCompass: !!(T && T.type==='compass'),\n      activeIsJohari: !!(T && T.type==='johari'),\n      activeIsValues: !!(T && T.type==='values'),\n      activeIsReflect: !!(T && T.type==='reflect')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
